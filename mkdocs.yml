site_name: Auburn University Mesh Club
site_description: Student-led Meshtastic, LoRa, and mesh networking at Auburn University
site_url: https://andrewsuggs465.github.io/

repo_name: andrewsuggs465/AU-Meshtastic
repo_url: https://github.com/andrewsuggs465/AU-Meshtastic
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/logos/SVG_au.svg
  favicon: assets/logos/SVG_au.svg
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  font:
    text: Outfit
    code: JetBrains Mono

extra_css:
  - https://fonts.googleapis.com/icon?family=Material+Icons
  - assets/styles/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed
  - attr_list

nav:
  - Home: index.md
  - Join: join.md
  - Documentation:
    - Overview: documentation.md
    - Intro & Overview: documentation/intro.md
    - Meshtastic Protocol: documentation/protocol.md
    - Microcontrollers & Modems: documentation/microcontrollers.md
    - Popular Build Options: documentation/build-options.md
    - Antennas, LoRa & RF: documentation/antennas-rf.md
    - Assembly Guide: documentation/assembly.md
    - Installation: documentation/installation.md
    - App Overview: documentation/app-overview.md
  - Events: 
    - Meetings:
        - Come back next semester!: assets/events/placeholder.md
    - Previous:
        - 2026-04-14 — Build Day: assets/events/2026-04-14-build-day.md
        - 2026-04-09 — Concourse Tabling: assets/events/2026-04-09-tabling.md
        - 2026-04-06 — Monthly Meeting: assets/events/2026-04-06-monthly-meeting.md
        - 2026-04-01 — ADCS Privacy Talk: assets/events/2026-04-01-privacy-talk.md
        - 2026-03-16 — Workshop: assets/events/2026-03-16-workshop.md
        - 2026-03-02 — Monthly Meeting: assets/events/2026-03-02-monthly-meeting.md
        - 2026-02-02 — Monthly Meeting: assets/events/2026-02-02-monthly-meeting.md
  - Project Hub: projects.md
  - Resources: resources.md
  - Uploads: https://auburn.box.com/s/d4jgsr0w9i4rygxcakc5eockw36nfeiw

