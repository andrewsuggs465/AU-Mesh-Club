site_name: Auburn University Mesh Club
site_description: Student-led Meshtastic, LoRa, and mesh networking at Auburn University
site_url: https://andrewsuggs465.github.io/

repo_name: andrewsuggs465/AU-Meshtastic
repo_url: https://github.com/andrewsuggs465/AU-Meshtastic
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/logos/SVG_au.svg
  favicon: assets/logos/SVG_au.svg
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  font:
    text: Outfit
    code: JetBrains Mono

extra_css:
  - https://fonts.googleapis.com/icon?family=Material+Icons
  - assets/styles/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed
  - attr_list

nav:
  - Home: index.md
  - Join: join.md
  - Documentation:
    - Overview: documentation.md
    - Meshtastic:
      - Intro & Overview: documentation/meshtastic/intro.md
      - Meshtastic Protocol: documentation/meshtastic/protocol.md
      - Microcontrollers & Modems: documentation/meshtastic/microcontrollers.md
      - Popular Build Options: documentation/meshtastic/build-options.md
      - Antennas, LoRa & RF: documentation/meshtastic/antennas-rf.md
      - Assembly Guide: documentation/meshtastic/assembly.md
      - Installation: documentation/meshtastic/installation.md
      - App Overview: documentation/meshtastic/app-overview.md
    - Encryption: documentation/encryption/encryption.md
  - Project Hub: projects.md
  - Resources: resources.md
  - Uploads: https://auburn.box.com/s/d4jgsr0w9i4rygxcakc5eockw36nfeiw

